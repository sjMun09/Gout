language: ko-KR

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/*.lock"
    - "!**/gradle/wrapper/**"
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/build/**"
    - "!**/target/**"
    - "!**/db/migration/**"

chat:
  auto_reply: true
