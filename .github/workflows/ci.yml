name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: gout_test
          POSTGRES_USER: gout
          POSTGRES_PASSWORD: gout1234
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install PostGIS extensions
        run: |
          psql -h localhost -U gout -d gout_test -c "CREATE EXTENSION IF NOT EXISTS postgis;" || true
          psql -h localhost -U gout -d gout_test -c "CREATE EXTENSION IF NOT EXISTS vector;" || true
          psql -h localhost -U gout -d gout_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" || true
        env:
          PGPASSWORD: gout1234

      - name: Build with Gradle
        working-directory: ./gout-back
        run: ./gradlew build -x test --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gout_test
          DB_USERNAME: gout
          DB_PASSWORD: gout1234
          JWT_SECRET: test-secret-key-must-be-at-least-256-bits-long-for-hs256

  backend-test:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Testcontainers 기반 통합 테스트는 docker build + Gradle 전체 빌드 포함으로 분당 소모가 크다.
    # PR 이벤트에서는 Backend Build & Test (build -x test) + Frontend Build 로 빌드 가능성만 검증하고,
    # 본격 통합 테스트는 main push 에서만 수행한다. (GitHub Actions spending limit 대응)
    # upstream 빌드 실패 시 통합 테스트를 skip 해 추가 Actions 비용 절감.
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build PostGIS + pgvector image for tests
        run: docker build -t gout-test-postgis-pgvector:local -f docker/postgres.Dockerfile docker/

      - name: Run Testcontainers integration tests
        working-directory: ./gout-back
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: gout-back/build/reports/tests/test
          retention-days: 7

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gout-front/package-lock.json

      - name: Install dependencies
        working-directory: ./gout-front
        run: npm ci

      - name: Type check
        working-directory: ./gout-front
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./gout-front
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_KAKAO_MAP_KEY: placeholder
