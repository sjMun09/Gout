name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: gout_test
          POSTGRES_USER: gout
          POSTGRES_PASSWORD: gout1234
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install PostGIS extensions
        run: |
          psql -h localhost -U gout -d gout_test -c "CREATE EXTENSION IF NOT EXISTS postgis;" || true
          psql -h localhost -U gout -d gout_test -c "CREATE EXTENSION IF NOT EXISTS vector;" || true
          psql -h localhost -U gout -d gout_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" || true
        env:
          PGPASSWORD: gout1234

      - name: Build with Gradle
        working-directory: ./gout-back
        run: ./gradlew build -x test --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gout_test
          DB_USERNAME: gout
          DB_PASSWORD: gout1234
          JWT_SECRET: test-secret-key-must-be-at-least-256-bits-long-for-hs256

      - name: Unit tests (fast)
        working-directory: ./gout-back
        run: ./gradlew unitTest --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/gout_test
          DB_USERNAME: gout
          DB_PASSWORD: gout1234
          JWT_SECRET: test-secret-key-must-be-at-least-256-bits-long-for-hs256

  backend-test:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # =========================================================================
    # 통합 테스트 정책 (자세한 내용: docs/26-04-25_ci-policy.md)
    # =========================================================================
    # - PR 이벤트: Backend Build & Test (build -x test + unitTest) + Frontend
    #   (lint/test/typecheck/build) 만 실행. Testcontainers 통합 테스트는 SKIP.
    # - main push 이벤트: 이 잡 (전체 통합 테스트) 추가 실행.
    # 사유: Testcontainers + docker build 는 분당 소모가 크다. PR 마다 돌리면
    #       GitHub Actions spending limit 초과.
    # upstream(backend / frontend) 실패 시 needs: 가 막아 추가 비용 절감.
    # 수동 트리거: PR merge → main push 에서 자동 실행. 강제 재실행은 Actions UI.
    # =========================================================================
    if: github.event_name == 'push'
    # 잡 자체가 testcontainers 행업으로 1시간+ 정체되는 패턴 차단 (이전: #65/#66 1.5h 정체).
    # 정상 실행은 ~10분 내 완료, 25분이면 충분한 여유. 초과 시 수동 재시도 하도록 강제 종료.
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build PostGIS + pgvector image for tests
        timeout-minutes: 5
        run: docker build -t gout-test-postgis-pgvector:local -f docker/postgres.Dockerfile docker/

      - name: Run Testcontainers integration tests
        timeout-minutes: 18
        working-directory: ./gout-back
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: gout-back/build/reports/tests/test
          retention-days: 7

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gout-front/package-lock.json

      - name: Install dependencies
        working-directory: ./gout-front
        run: npm ci

      - name: Lint
        working-directory: ./gout-front
        run: npm run lint

      - name: Type check
        working-directory: ./gout-front
        run: npm run typecheck

      - name: Test
        working-directory: ./gout-front
        run: npm run test:run

      - name: Build
        working-directory: ./gout-front
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_KAKAO_MAP_KEY: placeholder
