# AWS 배포 워크플로우
#
# 필요한 GitHub Secrets (Settings > Secrets and variables > Actions):
#   - AWS_ACCESS_KEY_ID          : AWS IAM Access Key
#   - AWS_SECRET_ACCESS_KEY      : AWS IAM Secret Key
#   - NEXT_PUBLIC_API_URL        : 백엔드 API URL (예: https://api.goutcare.com)
#   - NEXT_PUBLIC_KAKAO_MAP_KEY  : Kakao Map JavaScript Key
#   - EC2_HOST                   : EC2 퍼블릭 IP/도메인
#   - EC2_SSH_KEY                : EC2 SSH 프라이빗 키 (PEM 전체 내용)

name: Deploy to AWS

on:
  workflow_dispatch:    # 수동 실행만 허용 (AWS Secrets 설정 완료 후 push 트리거 추가)

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # AWS Secrets이 설정된 경우에만 실행
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/gout-backend:$IMAGE_TAG ./gout-back
          docker push $ECR_REGISTRY/gout-backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/gout-backend:$IMAGE_TAG $ECR_REGISTRY/gout-backend:latest
          docker push $ECR_REGISTRY/gout-backend:latest

      - name: Build and push Frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_KAKAO_MAP_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_MAP_KEY }} \
            -t $ECR_REGISTRY/gout-frontend:$IMAGE_TAG ./gout-front
          docker push $ECR_REGISTRY/gout-frontend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/gout-frontend:$IMAGE_TAG $ECR_REGISTRY/gout-frontend:latest
          docker push $ECR_REGISTRY/gout-frontend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/gout
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
