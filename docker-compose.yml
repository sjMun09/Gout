services:
  postgres:
    build:
      context: ./docker
      dockerfile: postgres.Dockerfile
    image: gout-postgres:pg17-postgis-pgvector
    container_name: gout-postgres
    environment:
      POSTGRES_DB: gout_dev
      POSTGRES_USER: gout
      POSTGRES_PASSWORD: gout1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gout -d gout_dev"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: gout-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./gout-back
    container_name: gout-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/gout_dev
      DB_USERNAME: gout
      DB_PASSWORD: gout1234
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-prod-at-least-32-chars-long}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - upload-data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./gout-front
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_KAKAO_MAP_KEY: ${NEXT_PUBLIC_KAKAO_MAP_KEY:-placeholder}
    container_name: gout-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  upload-data:
