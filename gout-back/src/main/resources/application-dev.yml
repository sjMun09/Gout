spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gout_dev}
    username: ${DB_USERNAME:gout}
    password: ${DB_PASSWORD:gout1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway 가 스키마를 관리하므로 Hibernate 검증은 끔.
      # 기존 엔티티 중 일부가 DB 컬럼 타입과 미세하게 안 맞아 validate 로 두면 기동 실패함
      # (예: users.birth_year SMALLINT ↔ User.birthYear Integer). 엔티티 정리는 별도 과제.
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # V25 (HNSW 인덱스 전환) 이 CREATE INDEX CONCURRENTLY 를 사용하여 트랜잭션 밖에서 실행된다.
    # 트랜잭셔널/논트랜잭셔널 스크립트를 한 실행에 섞어 쓰려면 mixed=true 필요.
    mixed: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

logging:
  level:
    com.gout: DEBUG
    org.hibernate.SQL: DEBUG

app:
  uploads:
    base-dir: ${UPLOADS_BASE_DIR:./uploads}
  crawler:
    enabled: ${PAPER_CRAWLER_ENABLED:false}
  # TODO: API 키 발급 필요 — 논문 크롤러 AI 요약/임베딩 기능. 키 없으면 크롤러는 NOOP.
  #   ANTHROPIC_API_KEY: Claude 요약 (https://console.anthropic.com/)
  #   OPENAI_API_KEY:    text-embedding-3-small 임베딩 (https://platform.openai.com/)
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  openai:
    api-key: ${OPENAI_API_KEY:}
