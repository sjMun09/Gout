spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gout_dev}
    username: ${DB_USERNAME:gout}
    password: ${DB_PASSWORD:gout1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway 가 스키마를 관리하므로 Hibernate 검증은 끔.
      # 기존 엔티티 중 일부가 DB 컬럼 타입과 미세하게 안 맞아 validate 로 두면 기동 실패함
      # (예: users.birth_year SMALLINT ↔ User.birthYear Integer). 엔티티 정리는 별도 과제.
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.gout: DEBUG
    org.hibernate.SQL: DEBUG

app:
  crawler:
    enabled: ${PAPER_CRAWLER_ENABLED:false}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  openai:
    api-key: ${OPENAI_API_KEY:}
