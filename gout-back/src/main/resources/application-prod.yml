spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  # Redis — 리프레시 토큰 저장/검증 (P1-8).
  # TODO: 운영에서는 Redis 가 필수다. 폴백 없음 — 연결 실패 시 토큰 재발급 API 가 5xx 를 낸다.
  #       REDIS_HOST 미설정 시 application.yml 기본값(localhost) 이 먹는데, 운영 컨테이너에는 Redis 가 없으므로 반드시 주입.
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

# 운영 환경에선 JWT_SECRET 환경변수 미설정이면 기동 실패 (application.yml 기본값 차단).
# 32자 미만이면 JwtTokenProvider @PostConstruct 단계에서 IllegalStateException.
jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.gout: INFO

app:
  uploads:
    base-dir: ${UPLOADS_BASE_DIR:/app/uploads}
  crawler:
    enabled: ${PAPER_CRAWLER_ENABLED:false}
  # TODO: API 키 발급 필요 — 운영 환경에서 논문 크롤러를 켜려면 필수.
  #   ANTHROPIC_API_KEY, OPENAI_API_KEY 미설정 시 PaperCrawlerJob 이 조용히 스킵됨.
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  openai:
    api-key: ${OPENAI_API_KEY:}
