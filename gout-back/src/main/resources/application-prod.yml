server:
  # P1-11: X-Forwarded-For 를 신뢰 프록시를 통해서만 해석.
  # NATIVE 전략은 Tomcat RemoteIpValve 를 활성화하여 internal-proxies 패턴에 매치되는
  # 프록시에서 전달된 X-Forwarded-For / X-Forwarded-Proto 만 파싱한다.
  # 그 외(직접 노출/신뢰 경계 밖) 요청의 XFF 는 무시되어 request.getRemoteAddr() 가 TCP 소스로 고정된다.
  forward-headers-strategy: NATIVE
  tomcat:
    remoteip:
      # 운영 배포 토폴로지에 맞는 CIDR 을 반드시 주입. 기본값은 사내/컨테이너 네트워크 사례.
      # 예) RFC1918(10.x/172.16-31/192.168.x) + 127.x loopback.
      # 정규식 문법: 각 옥텟은 마침표를 `\\.` 로 이스케이프.
      internal-proxies: ${TRUSTED_PROXIES:10\\..*|127\\.0\\.0\\.1|172\\.(1[6-9]|2[0-9]|3[0-1])\\..*|192\\.168\\..*}
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  # Redis — 리프레시 토큰 저장/검증 (P1-8).
  # 운영에서는 Redis 가 필수다. REDIS_HOST/REDIS_PORT 는 ProdEnvironmentValidator 가 기동 단계에서 검증한다.
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # V25 가 CREATE INDEX CONCURRENTLY 를 쓰므로 트랜잭션 밖 실행 허용.
    mixed: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

# 운영 환경에선 JWT_SECRET 환경변수 미설정이면 기동 실패 (application.yml 기본값 차단).
# 32자 미만이면 JwtTokenProvider @PostConstruct 단계에서 IllegalStateException.
jwt:
  secret: ${JWT_SECRET}

# HIGH-002: 운영 환경에서 Swagger UI / OpenAPI 문서 엔드포인트를 비활성화한다.
# API 스펙 노출은 공격자에게 엔드포인트 목록, 파라미터 구조, 인증 방식을 그대로 제공한다.
# dev/test 프로파일은 이 파일을 읽지 않으므로 개발 편의성에 영향 없음.
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    com.gout: INFO

app:
  uploads:
    base-dir: ${UPLOADS_BASE_DIR:/app/uploads}
  crawler:
    enabled: ${PAPER_CRAWLER_ENABLED:false}
  # 운영에서 PAPER_CRAWLER_ENABLED=true 이면 ANTHROPIC_API_KEY/OPENAI_API_KEY 모두 필수.
  # ProdEnvironmentValidator 가 누락 시 명확한 메시지로 기동 실패시킨다.
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  openai:
    api-key: ${OPENAI_API_KEY:}
  cors:
    # 운영 배포 전에 CORS_ALLOWED_ORIGINS 환경변수를 반드시 설정할 것.
    #   예) CORS_ALLOWED_ORIGINS=https://gout.example.com,https://admin.gout.example.com
    #   기본값 없음 — 미설정 시 기동 단계에서 빠르게 실패(fail fast)시켜 보안 구멍 방지.
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
