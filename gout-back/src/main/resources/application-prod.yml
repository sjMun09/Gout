spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# 운영 환경에선 JWT_SECRET 환경변수 미설정이면 기동 실패 (application.yml 기본값 차단).
# 32자 미만이면 JwtTokenProvider @PostConstruct 단계에서 IllegalStateException.
jwt:
  secret: ${JWT_SECRET}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

logging:
  level:
    com.gout: INFO

app:
  uploads:
    base-dir: ${UPLOADS_BASE_DIR:/app/uploads}
  crawler:
    enabled: ${PAPER_CRAWLER_ENABLED:false}
  # TODO: API 키 발급 필요 — 운영 환경에서 논문 크롤러를 켜려면 필수.
  #   ANTHROPIC_API_KEY, OPENAI_API_KEY 미설정 시 PaperCrawlerJob 이 조용히 스킵됨.
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  openai:
    api-key: ${OPENAI_API_KEY:}
  cors:
    # TODO: 운영 배포 전에 CORS_ALLOWED_ORIGINS 환경변수를 반드시 설정할 것.
    #   예) CORS_ALLOWED_ORIGINS=https://gout.example.com,https://admin.gout.example.com
    #   기본값 없음 — 미설정 시 기동 단계에서 빠르게 실패(fail fast)시켜 보안 구멍 방지.
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
