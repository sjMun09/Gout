spring:
  profiles:
    active: dev
  application:
    name: gout-back
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:gout-care-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiry: 900000       # 15분
  refresh-token-expiry: 604800000   # 7일
