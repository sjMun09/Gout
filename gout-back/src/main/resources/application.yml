spring:
  profiles:
    active: dev
  application:
    name: gout-back
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:gout-care-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiry: 900000       # 15분
  refresh-token-expiry: 604800000   # 7일

app:
  cors:
    # CORS 허용 오리진 화이트리스트 (dev 기본값).
    # allowCredentials=true 와 함께 쓰이므로 반드시 명시적 오리진이어야 한다(와일드카드 금지).
    # 운영 환경 값은 application-prod.yml 에서 CORS_ALLOWED_ORIGINS 로 오버라이드.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3010}
