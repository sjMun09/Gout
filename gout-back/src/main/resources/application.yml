spring:
  profiles:
    active: dev
  application:
    name: gout-back
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
  # Redis — 리프레시 토큰 저장/검증 (P1-8).
  # TODO: 운영에서는 application-prod.yml 의 REDIS_HOST/REDIS_PORT/REDIS_PASSWORD 환경변수 주입 필수.
  #       Redis 가 없으면 로그아웃/로테이션이 무력화되므로 폴백 없이 실패시킨다.
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    # RequestIdFilter 가 MDC 에 넣는 값을 모든 로그 라인에 싣는다.
    level: "%5p requestId=%X{requestId:-}"

jwt:
  # JWT 서명 키. 기본값 없음 — 미설정 시 Spring placeholder 해석 실패로 기동이 중단된다(BREAKING_CHANGE 알림).
  # 과거 application.yml 에 기본값이 커밋돼 있었으나 (노출된 비밀), 이번 PR 에서 제거.
  secret: ${JWT_SECRET}
  access-token-expiry: 900000       # 15분
  refresh-token-expiry: 604800000   # 7일

app:
  cors:
    # CORS 허용 오리진 화이트리스트 (dev 기본값).
    # allowCredentials=true 와 함께 쓰이므로 반드시 명시적 오리진이어야 한다(와일드카드 금지).
    # 운영 환경 값은 application-prod.yml 에서 CORS_ALLOWED_ORIGINS 로 오버라이드.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3010}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}
    admin-key: ${KAKAO_ADMIN_KEY:}
    native-app-key: ${KAKAO_NATIVE_APP_KEY:}
    hospital-keywords:
      - 류마티스내과
      - 통풍
      - 내과

# 레이트 리밋 (P1-9)
# 현재는 코드에 하드코딩된 한도를 사용:
#   - 로그인: 5 req/min per IP (RateLimiterService.LOGIN_BANDWIDTH)
#   - 좋아요: 30 req/min per userId (RateLimiterService.LIKE_BANDWIDTH)
# TODO(P1-9): Bucket4j 상태는 현재 in-memory(Caffeine) 전용이다.
#   멀티 인스턴스 배포 시 각 노드가 독립 버킷을 갖게 되어 실제 한도가 노드 수만큼 느슨해짐.
#   프로덕션 스케일아웃 전에 Redis(jcache-redisson) 또는 Hazelcast 백엔드로 교체 — 추후 PR.
