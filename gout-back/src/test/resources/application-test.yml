spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

app:
  uploads:
    base-dir: ${java.io.tmpdir}/gout-test-uploads

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-xxxxx
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    com.gout: INFO
    org.hibernate.SQL: WARN
    org.testcontainers: INFO
