spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # V25 가 CONCURRENTLY 를 쓰므로 트랜잭션 밖 실행 허용.
    mixed: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

app:
  uploads:
    base-dir: ${java.io.tmpdir}/gout-test-uploads
  cors:
    # 테스트 프로파일 CORS 화이트리스트. CorsConfigIntegrationTest 가 이 값에 의존.
    allowed-origins: http://localhost:3000,http://localhost:3010

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-xxxxx
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    com.gout: INFO
    org.hibernate.SQL: WARN
    org.testcontainers: INFO
